<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111111;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: #111111;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 14px;
      height: 14px;
      fill: #ffffff;
    }

    .logo-name {
      font-size: 14px;
      font-weight: 700;
      color: #111111;
      letter-spacing: 0.5px;
    }

    .logo-sub {
      font-size: 10px;
      color: #888888;
      margin-top: 1px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-idle {
      background: #f0f0f0;
      color: #555555;
      border: 1px solid #dddddd;
    }

    .badge-recording {
      background: #111111;
      color: #ffffff;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* Sections */
    #loginSection {
      display: none;
      padding: 20px 16px;
    }

    #recorderSection {
      display: none;
      padding: 16px;
    }

    /* Labels */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    /* Form */
    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #555555;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 10px;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      color: #111111;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: #111111;
      background: #ffffff;
    }

    input::placeholder {
      color: #bbbbbb;
    }

    select {
      cursor: pointer;
    }

    select option {
      background: #ffffff;
      color: #111111;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #111111;
      color: #ffffff;
      margin-top: 12px;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    .btn-record {
      background: #111111;
      color: #ffffff;
    }

    .btn-record:hover {
      opacity: 0.85;
    }

    .btn-stop {
      background: #ffffff;
      color: #111111;
      border: 1px solid #cccccc;
    }

    .btn-stop:hover {
      border-color: #111111;
    }

    .btn-logout {
      background: transparent;
      color: #888888;
      border: 1px solid #e5e5e5;
      font-size: 11px;
      padding: 5px 10px;
      width: auto;
    }

    .btn-logout:hover {
      color: #111111;
      border-color: #111111;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 5px;
      padding: 9px 12px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-idle {
      background: #bbbbbb;
    }

    .dot-recording {
      background: #111111;
      animation: dotPulse 1s ease-in-out infinite;
    }

    @keyframes dotPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.5);
      }
    }

    .status-text {
      font-size: 12px;
      color: #555555;
      flex: 1;
    }

    .status-text strong {
      color: #111111;
    }

    .counter {
      font-size: 11px;
      font-weight: 700;
      color: #111111;
      background: #e5e5e5;
      padding: 2px 7px;
      border-radius: 3px;
      min-width: 24px;
      text-align: center;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #e5e5e5;
      margin: 12px 0;
    }

    /* User row */
    .user-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 22px;
      height: 22px;
      background: #111111;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #ffffff;
      flex-shrink: 0;
    }

    #userInfo {
      font-size: 11px;
      color: #888888;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
    }

    .toast-success {
      background: #f0f0f0;
      color: #111111;
      border: 1px solid #cccccc;
    }

    .toast-error {
      background: #111111;
      color: #ffffff;
    }

    .toast-info {
      background: #f7f7f7;
      color: #555555;
      border: 1px solid #e0e0e0;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="5" height="5" rx="1" />
          <rect x="9" y="2" width="5" height="5" rx="1" />
          <rect x="2" y="9" width="5" height="5" rx="1" />
          <rect x="9" y="9" width="5" height="5" rx="1" />
        </svg>
      </div>
      <div>
        <div class="logo-name">RB-BOT</div>
        <div class="logo-sub">Workflow Recorder</div>
      </div>
    </div>
    <div id="headerBadge" class="badge badge-idle">Idle</div>
  </div>

  <!-- Login -->
  <div id="loginSection">
    <p class="section-title">Sign in to continue</p>

    <div class="field">
      <label>Username</label>
      <input type="text" id="email" placeholder="Enter username">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button id="loginBtn" class="btn btn-primary">Sign In</button>

    <div id="loginToast" class="toast"></div>
  </div>

  <!-- Recorder -->
  <div id="recorderSection">

    <!-- Status -->
    <div class="status-bar">
      <div id="statusDot" class="status-dot dot-idle"></div>
      <div class="status-text" id="statusText"><strong>Ready</strong> to record</div>
      <div class="counter" id="actionCount">0</div>
    </div>

    <!-- Bot -->
    <div class="field">
      <label>Bot</label>
      <select id="botSelect">
        <option value="">Select a bot</option>
      </select>
    </div>

    <!-- Workflow Name -->
    <div class="field">
      <label>Workflow Name</label>
      <input type="text" id="workflowNameInput" placeholder="e.g. Login Flow">
    </div>

    <button id="recordBtn" class="btn btn-record">Start Recording</button>
    <button id="stopBtn" class="btn btn-stop" style="display:none; margin-top: 6px;">Stop and Save</button>

    <div id="recorderToast" class="toast"></div>

    <div class="divider"></div>

    <div class="user-row">
      <div class="user-avatar" id="userAvatar">?</div>
      <div id="userInfo">Not logged in</div>
      <button id="logoutBtn" class="btn btn-logout">Logout</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>

</html>
