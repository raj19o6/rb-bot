<!DOCTYPE html>
<html>

<head>
  <title>RB-BOT Recording Test</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }

    #status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }

    .recording {
      background: #fee;
      color: #c00;
    }

    .idle {
      background: #efe;
      color: #060;
    }

    input {
      padding: 8px;
      margin: 10px;
      width: 200px;
    }
  </style>
</head>

<body>
  <h1>RB-BOT Recording Test</h1>

  <div id="status" class="idle">Ready</div>

  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" style="display:none;">Stop Recording</button>

  <hr>

  <h2>Test Area</h2>
  <input type="text" id="testInput" placeholder="Type here">
  <button id="testBtn">Click Me</button>

  <div id="actions"></div>

  <script>
    let isRecording = false;
    let actions = [];

    document.getElementById('startBtn').addEventListener('click', () => {
      isRecording = true;
      actions = [];
      document.getElementById('status').textContent = '🔴 Recording...';
      document.getElementById('status').className = 'recording';
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'block';
      console.log('Recording started');
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      isRecording = false;
      document.getElementById('status').textContent = `✅ Recorded ${actions.length} actions`;
      document.getElementById('status').className = 'idle';
      document.getElementById('startBtn').style.display = 'block';
      document.getElementById('stopBtn').style.display = 'none';
      console.log('Recording stopped. Actions:', actions);

      document.getElementById('actions').innerHTML = '<h3>Recorded Actions:</h3><pre>' +
        JSON.stringify(actions, null, 2) + '</pre>';
    });

    // Record clicks
    document.addEventListener('click', (e) => {
      if (!isRecording) return;
      if (e.target.id === 'startBtn' || e.target.id === 'stopBtn') return;

      const action = {
        type: 'click',
        element: e.target.id || e.target.tagName,
        text: e.target.textContent?.substring(0, 30),
        timestamp: Date.now()
      };
      actions.push(action);
      console.log('Recorded:', action);
    }, true);

    // Record inputs
    document.addEventListener('input', (e) => {
      if (!isRecording) return;

      const action = {
        type: 'input',
        element: e.target.id || e.target.tagName,
        value: e.target.value,
        timestamp: Date.now()
      };
      actions.push(action);
      console.log('Recorded:', action);
    }, true);
  </script>
</body>

</html>
