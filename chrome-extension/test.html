<!DOCTYPE html>
<html>
<head>
  <title>Test Recording Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    input, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Test Recording Page</h1>
  
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  
  <div id="result"></div>
  
  <script>
    document.getElementById('loginBtn').addEventListener('click', () => {
      document.getElementById('result').textContent = 'Button clicked!';
    });
  </script>
</body>
</html>
